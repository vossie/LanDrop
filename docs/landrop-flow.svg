<svg width="1280" height="320" viewBox="0 0 1280 320" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1280" height="320" rx="28" fill="white"/>
  <rect x="40" y="60" width="280" height="200" rx="28" fill="#F7FBFF" stroke="#BED6FF" stroke-width="3"/>
  <rect x="500" y="60" width="280" height="200" rx="28" fill="#F7FBFF" stroke="#BED6FF" stroke-width="3"/>
  <rect x="960" y="60" width="280" height="200" rx="28" fill="#F7FBFF" stroke="#BED6FF" stroke-width="3"/>
  <text x="88" y="118" fill="#0F2A7A" font-family="Arial, sans-serif" font-size="32" font-weight="700">1. Paste or upload</text>
  <text x="88" y="160" fill="#45619D" font-family="Arial, sans-serif" font-size="22">Drop text or files from any</text>
  <text x="88" y="190" fill="#45619D" font-family="Arial, sans-serif" font-size="22">browser on your LAN.</text>
  <text x="545" y="118" fill="#0F2A7A" font-family="Arial, sans-serif" font-size="32" font-weight="700">2. Share the link</text>
  <text x="545" y="160" fill="#45619D" font-family="Arial, sans-serif" font-size="22">Each item gets a short</text>
  <text x="545" y="190" fill="#45619D" font-family="Arial, sans-serif" font-size="22">LAN URL like /s/U9UN.</text>
  <text x="1008" y="118" fill="#0F2A7A" font-family="Arial, sans-serif" font-size="32" font-weight="700">3. Open anywhere</text>
  <text x="1008" y="160" fill="#45619D" font-family="Arial, sans-serif" font-size="22">Copy text, download files,</text>
  <text x="1008" y="190" fill="#45619D" font-family="Arial, sans-serif" font-size="22">or require a password.</text>
