<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DassieDrop Login</title>
  <link rel="icon" type="image/png" href="/assets/dassiedrop-dassie-icon.png">
  <link rel="stylesheet" href="/assets/login.css">
</head>
<body>
<main class="card">
  <img class="login-brand" src="/assets/DassieDrop-full-text-logo.png" alt="DassieDrop">
  <h1>Access Code</h1>
  <p>Enter the shared access code to use this page from another browser on your network.</p>
  <input id="accessCode" type="password" placeholder="Access code" autofocus>
  <button id="loginBtn" type="button">Unlock</button>
  <div class="error" id="loginStatus"></div>
</main>
<script src="/assets/login.js"></script>
</body>
</html>
